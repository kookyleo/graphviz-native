name: Build

on:
  push:
    tags:
      - 'v*'
      - 'test*'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential bison flex \
            pkg-config libexpat1-dev zlib1g-dev libltdl-dev \
            libpango1.0-dev libharfbuzz-dev

      - name: Build
        run: |
          chmod +x scripts/*.sh
          ./scripts/build-linux.sh --arch ${{ matrix.arch }}

      - name: Copy to packages/core-rust/prebuilt
        run: |
          mkdir -p packages/core-rust/prebuilt/linux
          cp output/linux-${{ matrix.arch }}/lib/libgraphviz_api.a packages/core-rust/prebuilt/linux/ || true

      - name: Package
        run: |
          cd output/linux-${{ matrix.arch }}
          tar czf "${GITHUB_WORKSPACE}/graphviz-native-linux-${{ matrix.arch }}.tar.gz" .

      - uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}
          path: graphviz-native-linux-${{ matrix.arch }}.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: prebuilt-linux
          path: packages/core-rust/prebuilt/linux/

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install bison flex

      - name: Build universal binary
        run: |
          export PATH="$(brew --prefix bison)/bin:$(brew --prefix flex)/bin:$PATH"
          chmod +x scripts/*.sh
          ./scripts/build-macos.sh --arch universal

      - name: Copy to packages/core-rust/prebuilt
        run: |
          mkdir -p packages/core-rust/prebuilt/macos
          cp output/macos-universal/lib/libgraphviz_api.a packages/core-rust/prebuilt/macos/ || true

      - name: Package
        run: |
          cd output/macos-universal
          tar czf "${GITHUB_WORKSPACE}/graphviz-native-macos-universal.tar.gz" .

      - uses: actions/upload-artifact@v7
        with:
          name: macos-universal
          path: graphviz-native-macos-universal.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: prebuilt-macos
          path: packages/core-rust/prebuilt/macos/

  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install bison flex

      - name: Build iOS
        run: |
          export PATH="$(brew --prefix bison)/bin:$(brew --prefix flex)/bin:$PATH"
          chmod +x scripts/*.sh
          ./scripts/build-ios.sh

      - name: Package
        run: |
          cd output/ios
          tar czf "${GITHUB_WORKSPACE}/graphviz-native-ios.tar.gz" .

      - uses: actions/upload-artifact@v7
        with:
          name: ios
          path: graphviz-native-ios.tar.gz

  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential bison flex pkg-config curl

      - name: Setup NDK
        run: yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;25.2.9519653"

      - name: Build
        run: |
          export ANDROID_NDK_HOME="${ANDROID_SDK_ROOT}/ndk/25.2.9519653"
          chmod +x scripts/*.sh
          ./scripts/build-android.sh --abi ${{ matrix.abi }}

      - name: Package
        run: |
          cd output/android/${{ matrix.abi }}
          tar czf "${GITHUB_WORKSPACE}/graphviz-native-android-${{ matrix.abi }}.tar.gz" .

      - uses: actions/upload-artifact@v7
        with:
          name: android-${{ matrix.abi }}
          path: graphviz-native-android-${{ matrix.abi }}.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          choco install winflexbison3 -y
          choco install pkgconfiglite -y

      - name: Build
        shell: bash
        run: |
          chmod +x scripts/*.sh
          ./scripts/build-windows.sh

      - name: Package
        shell: bash
        run: |
          cd output/windows-x86_64
          7z a "${GITHUB_WORKSPACE}/graphviz-native-windows-x86_64.zip" .

      - uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64
          path: graphviz-native-windows-x86_64.zip

  build-wasm:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install emscripten
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential bison flex pkg-config

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v13
        with:
          version: latest

      - name: Build Wasm
        run: |
          chmod +x scripts/*.sh
          ./scripts/build-wasm.sh

      - name: Copy to packages/core-js/dist
        run: |
          mkdir -p packages/core-js/dist
          cp output/wasm/*.wasm packages/core-js/dist/ || true
          cp output/wasm/*.js packages/core-js/dist/ || true
          cp output/wasm/*.d.ts packages/core-js/dist/ || true

      - name: Package
        run: |
          cd output/wasm
          tar czf "${GITHUB_WORKSPACE}/graphviz-native-wasm.tar.gz" .

      - uses: actions/upload-artifact@v7
        with:
          name: wasm
          path: graphviz-native-wasm.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: wasm-dist
          path: packages/core-js/dist/

  publish-npm-cargo:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-macos, build-ios, build-android, build-windows, build-wasm]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Debug workspace
        run: |
          echo "Current dir: $(pwd)"
          ls -la
          [ -f package.json ] && echo "✓ package.json found" || echo "✗ package.json NOT found"

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Download prebuilt artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Restore prebuilt libraries
        run: |
          mkdir -p packages/core-rust/prebuilt/{macos,linux,windows}
          mkdir -p packages/core-js/dist
          # 尽力复制，但不要因为缺失文件而失败
          cp -r artifacts/prebuilt-macos/* packages/core-rust/prebuilt/macos/ 2>/dev/null || true
          cp -r artifacts/prebuilt-linux/* packages/core-rust/prebuilt/linux/ 2>/dev/null || true
          cp -r artifacts/wasm-dist/* packages/core-js/dist/ 2>/dev/null || true
          ls -la packages/core-js/dist/ || echo "⚠️  Warning: wasm-dist may not be available"

      - name: Symlink wasm files for TypeScript compilation
        run: |
          mkdir -p output/wasm
          ln -sf ../../packages/core-js/dist/viz.js output/wasm/viz.js || true
          ln -sf ../../packages/core-js/dist/viz.wasm output/wasm/viz.wasm || true
          ln -sf ../../packages/core-js/dist/viz.d.ts output/wasm/viz.d.ts || true

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build --workspaces

      - name: Publish to npm
        run: |
          npm publish --workspace packages/core-js --access public
          npm publish --workspace packages/js/web --access public
          npm publish --workspace packages/react-native --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --manifest-path packages/core-rust/Cargo.toml --token ${{ secrets.CARGO_TOKEN }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos, build-ios, build-android, build-windows]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip

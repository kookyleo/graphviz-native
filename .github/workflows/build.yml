name: Build

on:
  push:
    tags:
      - 'v*'
      - 'test*'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runs-on: ubuntu-latest
          - arch: aarch64
            # TODO(infra): switch to ubuntu-24.04-arm once confirmed available in this org
            runs-on: ubuntu-latest
            continue-on-error: true
    runs-on: ${{ matrix.runs-on }}
    continue-on-error: ${{ matrix.continue-on-error == true }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Resolve graphviz submodule pin
        id: gvpin
        run: echo "sha=$(git rev-parse HEAD:graphviz)" >> "$GITHUB_OUTPUT"

      - name: Cache build output
        id: cache
        uses: actions/cache@v4
        with:
          path: output/linux-${{ matrix.arch }}
          key: gv-build-linux-${{ matrix.arch }}-${{ steps.gvpin.outputs.sha }}-${{ hashFiles('capi/**', 'scripts/build-linux.sh', 'scripts/common.sh') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential bison flex \
            pkg-config libexpat1-dev zlib1g-dev libltdl-dev \
            libpango1.0-dev libharfbuzz-dev

      - name: Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/*.sh
          ./scripts/build-linux.sh --arch ${{ matrix.arch }}

      - name: Copy to packages/rust/prebuilt (legacy layout)
        run: |
          mkdir -p packages/rust/prebuilt/linux
          cp output/linux-${{ matrix.arch }}/lib/libgraphviz_api.a packages/rust/prebuilt/linux/ || true

      - name: Copy to packages/rust/prebuilt (target-triple layout)
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            TRIPLE="x86_64-unknown-linux-gnu"
          else
            TRIPLE="aarch64-unknown-linux-gnu"
          fi
          mkdir -p "packages/rust/prebuilt/${TRIPLE}"
          cp "output/linux-${{ matrix.arch }}/lib/libgraphviz_api.a" \
             "packages/rust/prebuilt/${TRIPLE}/libgraphviz_api.a" || true

      - name: Package
        run: |
          cd output/linux-${{ matrix.arch }}
          tar czf "${GITHUB_WORKSPACE}/graphviz-native-linux-${{ matrix.arch }}.tar.gz" .

      - uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}
          path: graphviz-native-linux-${{ matrix.arch }}.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: prebuilt-linux-${{ matrix.arch }}
          path: packages/rust/prebuilt/

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Resolve graphviz submodule pin
        id: gvpin
        run: echo "sha=$(git rev-parse HEAD:graphviz)" >> "$GITHUB_OUTPUT"

      - name: Cache build output
        id: cache
        uses: actions/cache@v4
        with:
          path: output/macos-universal
          key: gv-build-macos-universal-${{ steps.gvpin.outputs.sha }}-${{ hashFiles('capi/**', 'scripts/build-macos.sh', 'scripts/common.sh') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install bison flex

      - name: Build universal binary
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(brew --prefix bison)/bin:$(brew --prefix flex)/bin:$PATH"
          chmod +x scripts/*.sh
          ./scripts/build-macos.sh --arch universal

      - name: Copy to packages/rust/prebuilt (legacy layout)
        run: |
          mkdir -p packages/rust/prebuilt/macos
          cp output/macos-universal/lib/libgraphviz_api.a packages/rust/prebuilt/macos/ || true

      - name: Copy to packages/rust/prebuilt (target-triple layout)
        run: |
          # Universal binary serves both Darwin targets
          for TRIPLE in aarch64-apple-darwin x86_64-apple-darwin; do
            mkdir -p "packages/rust/prebuilt/${TRIPLE}"
            cp output/macos-universal/lib/libgraphviz_api.a \
               "packages/rust/prebuilt/${TRIPLE}/libgraphviz_api.a" || true
          done

      - name: Package
        run: |
          cd output/macos-universal
          tar czf "${GITHUB_WORKSPACE}/graphviz-native-macos-universal.tar.gz" .

      - uses: actions/upload-artifact@v7
        with:
          name: macos-universal
          path: graphviz-native-macos-universal.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: prebuilt-macos
          path: packages/rust/prebuilt/

  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Resolve graphviz submodule pin
        id: gvpin
        run: echo "sha=$(git rev-parse HEAD:graphviz)" >> "$GITHUB_OUTPUT"

      - name: Cache build output
        id: cache
        uses: actions/cache@v4
        with:
          path: output/ios
          key: gv-build-ios-${{ steps.gvpin.outputs.sha }}-${{ hashFiles('capi/**', 'scripts/build-ios.sh', 'scripts/common.sh') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install bison flex

      - name: Build iOS (all slices)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          export PATH="$(brew --prefix bison)/bin:$(brew --prefix flex)/bin:$PATH"
          chmod +x scripts/*.sh
          ./scripts/build-ios.sh

      # Legacy bundled tarball — RN postinstall depends on this name; do not rename.
      - name: Package legacy bundled tarball
        run: |
          cd output/ios
          tar czf "${GITHUB_WORKSPACE}/graphviz-native-ios.tar.gz" .

      # Per-slice tarballs: each contains lib/libgraphviz_api.a + include/*.h
      # for direct cargo build --target X consumption (build.rs Agent A layout).
      # Per-slice install dirs are keyed by "${sdk}-${arch}" exactly as
      # build-ios.sh writes them (iphoneos-arm64, iphonesimulator-arm64,
      # iphonesimulator-x86_64). The consumer-facing asset names use the
      # device/sim-arm64/sim-x86_64 short form for legibility.
      - name: Package per-slice tarball — device arm64
        run: |
          cd output/ios/iphoneos-arm64
          tar czf "${GITHUB_WORKSPACE}/graphviz-native-ios-device-arm64.tar.gz" \
            lib/libgraphviz_api.a include/

      - name: Package per-slice tarball — simulator arm64
        run: |
          cd output/ios/iphonesimulator-arm64
          tar czf "${GITHUB_WORKSPACE}/graphviz-native-ios-sim-arm64.tar.gz" \
            lib/libgraphviz_api.a include/

      - name: Package per-slice tarball — simulator x86_64
        run: |
          cd output/ios/iphonesimulator-x86_64
          tar czf "${GITHUB_WORKSPACE}/graphviz-native-ios-sim-x86_64.tar.gz" \
            lib/libgraphviz_api.a include/

      - uses: actions/upload-artifact@v7
        with:
          name: ios
          path: graphviz-native-ios.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: ios-device-arm64
          path: graphviz-native-ios-device-arm64.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: ios-sim-arm64
          path: graphviz-native-ios-sim-arm64.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: ios-sim-x86_64
          path: graphviz-native-ios-sim-x86_64.tar.gz

  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Resolve graphviz submodule pin
        id: gvpin
        run: echo "sha=$(git rev-parse HEAD:graphviz)" >> "$GITHUB_OUTPUT"

      - name: Cache build output
        id: cache
        uses: actions/cache@v4
        with:
          path: output/android/${{ matrix.abi }}
          key: gv-build-android-${{ matrix.abi }}-${{ steps.gvpin.outputs.sha }}-${{ hashFiles('capi/**', 'scripts/build-android.sh', 'scripts/common.sh') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential bison flex pkg-config curl

      - name: Setup NDK
        if: steps.cache.outputs.cache-hit != 'true'
        run: yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;25.2.9519653"

      - name: Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          export ANDROID_NDK_HOME="${ANDROID_SDK_ROOT}/ndk/25.2.9519653"
          chmod +x scripts/*.sh
          ./scripts/build-android.sh --abi ${{ matrix.abi }}

      - name: Package
        run: |
          cd output/android/${{ matrix.abi }}
          tar czf "${GITHUB_WORKSPACE}/graphviz-native-android-${{ matrix.abi }}.tar.gz" .

      - uses: actions/upload-artifact@v7
        with:
          name: android-${{ matrix.abi }}
          path: graphviz-native-android-${{ matrix.abi }}.tar.gz

  build-windows:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runs-on: windows-latest
          - arch: arm64
            runs-on: windows-latest
            # TODO(infra): verify Windows ARM64 cross-build (vcvarsall arm64)
            continue-on-error: true
    runs-on: ${{ matrix.runs-on }}
    continue-on-error: ${{ matrix.continue-on-error == true }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Resolve graphviz submodule pin
        id: gvpin
        shell: bash
        run: echo "sha=$(git rev-parse HEAD:graphviz)" >> "$GITHUB_OUTPUT"

      - name: Cache build output
        id: cache
        uses: actions/cache@v4
        with:
          path: output/windows-${{ matrix.arch }}
          key: gv-build-windows-${{ matrix.arch }}-${{ steps.gvpin.outputs.sha }}-${{ hashFiles('capi/**', 'scripts/build-windows.sh', 'scripts/common.sh') }}

      - name: Install dependencies
        # choco.org serves 503 periodically; retry a few times before
        # giving up. Each package is installed with its own retry loop
        # so a transient failure on one doesn't fall through to the next.
        if: steps.cache.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $pkgs = @('winflexbison3', 'pkgconfiglite')
          foreach ($pkg in $pkgs) {
            $success = $false
            for ($i = 1; $i -le 5; $i++) {
              Write-Host "Installing $pkg (attempt $i)..."
              choco install $pkg -y --no-progress
              if ($LASTEXITCODE -eq 0) { $success = $true; break }
              Start-Sleep -Seconds 10
            }
            if (-not $success) {
              Write-Error "Failed to install $pkg after 5 attempts"
              exit 1
            }
          }

      - name: Configure MSVC for ARM64 cross-compile
        if: matrix.arch == 'arm64' && steps.cache.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64_arm64

      - name: Build
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          chmod +x scripts/*.sh
          ./scripts/build-windows.sh --arch ${{ matrix.arch }}

      - name: Copy to packages/rust/prebuilt (legacy layout — x86_64 only)
        if: matrix.arch == 'x86_64'
        shell: bash
        run: |
          mkdir -p packages/rust/prebuilt/windows
          # graphviz_api_static.lib is the true static archive produced by the
          # build script; graphviz_api.lib is the DLL import lib (not useful for
          # static Rust linking).  Copy the static lib under the canonical name.
          cp output/windows-${{ matrix.arch }}/lib/graphviz_api_static.lib \
             packages/rust/prebuilt/windows/graphviz_api.lib || true

      - name: Copy to packages/rust/prebuilt (target-triple layout)
        shell: bash
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            TRIPLE="x86_64-pc-windows-msvc"
          else
            TRIPLE="aarch64-pc-windows-msvc"
          fi
          mkdir -p "packages/rust/prebuilt/${TRIPLE}"
          # Copy the static archive (graphviz_api_static.lib) as graphviz_api.lib
          # so that packages/rust/build.rs can find it under the standard name.
          cp "output/windows-${{ matrix.arch }}/lib/graphviz_api_static.lib" \
             "packages/rust/prebuilt/${TRIPLE}/graphviz_api.lib" || true

      - name: Package
        shell: bash
        run: |
          cd output/windows-${{ matrix.arch }}
          7z a "${GITHUB_WORKSPACE}/graphviz-native-windows-${{ matrix.arch }}.zip" .

      - uses: actions/upload-artifact@v7
        with:
          name: windows-${{ matrix.arch }}
          path: graphviz-native-windows-${{ matrix.arch }}.zip

      - uses: actions/upload-artifact@v7
        if: matrix.arch == 'x86_64'
        with:
          name: prebuilt-windows
          path: packages/rust/prebuilt/

  build-wasm:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Resolve graphviz submodule pin
        id: gvpin
        run: echo "sha=$(git rev-parse HEAD:graphviz)" >> "$GITHUB_OUTPUT"

      - name: Cache wasm build output
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            packages/web/dist/viz.js
            packages/web/dist/viz.wasm
            packages/web/dist/viz.d.ts
          key: gv-build-wasm-${{ steps.gvpin.outputs.sha }}-${{ hashFiles('capi/**', 'scripts/build-wasm.sh', 'scripts/common.sh') }}

      - name: Install emscripten
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential bison flex pkg-config

      - name: Setup Emscripten
        if: steps.cache.outputs.cache-hit != 'true'
        uses: mymindstorm/setup-emsdk@v13
        with:
          version: latest

      - name: Build Wasm
        # scripts/build-wasm.sh now emits viz.{js,wasm,d.ts} directly
        # into packages/web/dist/ (per the Embind rearch landed in
        # rearch/hpcc-js-aligned). No more output/wasm/ intermediate.
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/*.sh
          ./scripts/build-wasm.sh

      - name: Package
        run: |
          cd packages/web/dist
          tar czf "${GITHUB_WORKSPACE}/graphviz-native-wasm.tar.gz" viz.js viz.wasm viz.d.ts

      - uses: actions/upload-artifact@v7
        with:
          name: wasm
          path: graphviz-native-wasm.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: wasm-dist
          path: packages/web/dist/

  publish-npm-cargo:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-macos, build-windows, build-wasm]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Debug workspace
        run: |
          echo "Current dir: $(pwd)"
          ls -la
          [ -f package.json ] && echo "✓ package.json found" || echo "✗ package.json NOT found"

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Download prebuilt artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Restore prebuilt libraries
        run: |
          mkdir -p packages/rust/prebuilt/{macos,linux,windows}
          mkdir -p packages/web/dist
          # Best-effort copy; do not fail on missing files
          cp -r artifacts/prebuilt-macos/* packages/rust/prebuilt/macos/ 2>/dev/null || true
          cp -r artifacts/prebuilt-linux-x86_64/* packages/rust/prebuilt/linux/ 2>/dev/null || true
          cp -r artifacts/prebuilt-windows/* packages/rust/prebuilt/windows/ 2>/dev/null || true
          cp -r artifacts/wasm-dist/* packages/web/dist/ 2>/dev/null || true
          echo "=== prebuilt libs ===" && find packages/rust/prebuilt -type f
          echo "=== web/dist ===" && ls -la packages/web/dist/ || echo "⚠️  wasm-dist may not be available"

      - name: Symlink wasm files for TypeScript compilation
        run: |
          mkdir -p output/wasm
          ln -sf ../../packages/web/dist/viz.js output/wasm/viz.js || true
          ln -sf ../../packages/web/dist/viz.wasm output/wasm/viz.wasm || true
          ln -sf ../../packages/web/dist/viz.d.ts output/wasm/viz.d.ts || true

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build --workspaces

      - name: Check npm package versions
        run: npm run check:publish:npm

      - name: Publish to npm
        run: |
          npm publish --workspace packages/web --access public --auth-type=legacy
          npm publish --workspace packages/react-native --access public --auth-type=legacy
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_OTP: ${{ secrets.NPM_OTP }}

      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --manifest-path packages/rust/Cargo.toml --token ${{ secrets.CARGO_TOKEN }} --allow-dirty --no-verify

  release:
    # Run on real v* tags (full release) and test* tags (prerelease pipeline dry-run).
    # Push test-v0.2.0-rc1 to fully verify assets before tagging real v0.2.0.
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/test')
    needs:
      - build-linux
      - build-macos
      - build-ios
      - build-android
      - build-windows
      - build-wasm
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten release assets
        run: |
          mkdir -p release-assets
          # Collect every .tar.gz and .zip from all artifact subdirs
          find artifacts -name '*.tar.gz' -o -name '*.zip' | \
            xargs -I{} cp {} release-assets/ || true
          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          # test* tags produce a prerelease so the pipeline can be verified
          # end-to-end without polluting the stable release list.
          prerelease: ${{ startsWith(github.ref, 'refs/tags/test') }}
          generate_release_notes: true
          files: |
            release-assets/graphviz-native-linux-x86_64.tar.gz
            release-assets/graphviz-native-linux-aarch64.tar.gz
            release-assets/graphviz-native-macos-universal.tar.gz
            release-assets/graphviz-native-windows-x86_64.zip
            release-assets/graphviz-native-windows-arm64.zip
            release-assets/graphviz-native-android-arm64-v8a.tar.gz
            release-assets/graphviz-native-android-armeabi-v7a.tar.gz
            release-assets/graphviz-native-android-x86_64.tar.gz
            release-assets/graphviz-native-android-x86.tar.gz
            release-assets/graphviz-native-ios.tar.gz
            release-assets/graphviz-native-ios-device-arm64.tar.gz
            release-assets/graphviz-native-ios-sim-arm64.tar.gz
            release-assets/graphviz-native-ios-sim-x86_64.tar.gz
            release-assets/graphviz-native-wasm.tar.gz
